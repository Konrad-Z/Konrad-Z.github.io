<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Work+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Konrad's Portfolio</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://konrad-z.github.io">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Konrad's Portfolio">
    <meta property="og:description" content="Explore my projects, skills, and contact details.">
    <meta property="og:image" content="https://konrad-z.github.io/assets/images/preview.png">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="konrad-z.github.io">
    <meta property="twitter:url" content="https://konrad-z.github.io">
    <meta name="twitter:title" content="Konrad's Portfolio">
    <meta name="twitter:description" content="Explore my projects, skills, and contact details.">
    <meta name="twitter:image" content="https://konrad-z.github.io/assets/images/preview.png">

  </head>
  <body>
  <div class="relative flex min-h-screen flex-col bg-white" style='font-family: "Work Sans", "Noto Sans", sans-serif;'>
    <!-- Navbar -->
    <header class="flex items-center justify-between border-b-2 border-[#d0d4d9] px-10 py-4">
      <h1 class="text-xl font-bold text-[#111418]">Konrad Zajac's Portfolio</h1>
      <nav class="flex gap-6">
        <a href="#about" class="text-base font-medium text-[#111418] hover:underline">3D Archive</a>
      </nav>
    </header>

    <!-- Video Grid -->
    <main class="relative px-4 py-8 max-w-full mx-auto">

      <!-- Left Arrow -->
      <button id="scrollLeft" class="absolute left-0 top-1/2 -translate-y-1/2 bg-gray-800 text-white p-3 rounded-full z-10 hover:bg-gray-600">
        &#8592;
      </button>

      <!-- Video Container -->
      <div id="videoContainer" class="flex gap-6 overflow-x-auto scroll-smooth no-scrollbar px-12">
        
        <!-- Project 1 -->
        <div class="flex-shrink-0 w-[600px] flex flex-col gap-2">
          <video autoplay loop muted playsinline class="rounded-lg w-full h-[340px] object-cover">
            <source src="assets/images/Pixel 6 Water Sim_2.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
          <p class="text-sm text-gray-600 text-center">Water Simulation</p>
        </div>

        <!-- Project 2 -->
        <div class="flex-shrink-0 w-[600px] flex flex-col gap-2">
          <video autoplay loop muted playsinline class="rounded-lg w-full h-[340px] object-cover">
            <source src="assets/images/Trees.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
          <p class="text-sm text-gray-600 text-center">Tree Loop</p>
        </div>

        <!-- Project 3 -->
        <div class="flex-shrink-0 w-[600px] flex flex-col gap-2">
          <video autoplay loop muted playsinline class="rounded-lg w-full h-[340px] object-cover">
            <source src="assets/images/WaterFX2.mkv" type="video/mp4">
            Your browser does not support the video tag.
          </video>
          <p class="text-sm text-gray-600 text-center">Water FX</p>
        </div>

      </div>

      <!-- Right Arrow -->
      <button id="scrollRight" class="absolute right-0 top-1/2 -translate-y-1/2 bg-gray-800 text-white p-3 rounded-full z-10 hover:bg-gray-600">
        &#8594;
      </button>
      
    </main>
    
    <style>
      /* Hide scrollbar for all browsers */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    
    <script>
      const videoContainer = document.getElementById('videoContainer');
      const scrollAmount = 650; // match video width + gap

      document.getElementById('scrollLeft').addEventListener('click', () => {
        videoContainer.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
      });

      document.getElementById('scrollRight').addEventListener('click', () => {
        videoContainer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
      });
    </script>

  </div>
</body>
</html>
