<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900&amp;family=Work+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Konrad's Portfolio</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://konrad-z.github.io">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Konrad's Portfolio">
    <meta property="og:description" content="Explore my projects, skills, and contact details.">
    <meta property="og:image" content="https://konrad-z.github.io/assets/images/preview.png">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="konrad-z.github.io">
    <meta property="twitter:url" content="https://konrad-z.github.io">
    <meta name="twitter:title" content="Konrad's Portfolio">
    <meta name="twitter:description" content="Explore my projects, skills, and contact details.">
    <meta name="twitter:image" content="https://konrad-z.github.io/assets/images/preview.png">

  </head>
  <body>
  <div class="relative flex min-h-screen flex-col bg-white" style='font-family: "Work Sans", "Noto Sans", sans-serif;'>
    <!-- Navbar -->
    <header class="flex items-center justify-between border-b-2 border-[#d0d4d9] px-10 py-4">
      <h1 class="text-xl font-bold text-[#111418]">Konrad Zajac's Portfolio</h1>
      <nav class="flex gap-6">
        <a href="#about" class="text-base font-medium text-[#111418] hover:underline">3D Archive</a>
      </nav>
    </header>

    <!-- Video Grid -->
    <main class="px-10 py-8 max-w-6xl mx-auto">
      <div class="grid grid-cols-[repeat(auto-fit,minmax(250px,1fr))] gap-6">
        
        <!-- Project 1 -->
        <div class="flex flex-col gap-2">
          <video autoplay loop muted playsinline class="rounded-lg w-full">
            <source src="assets/images/Pixel 6 Water Sim_2.mp4" type="video/mp4">
            Your browser does not support the video tag.
          </video>
          <p class="text-sm text-gray-600">Water Simulation</p>
          </div>

          <!-- Project 2 -->
          <div class="flex flex-col gap-2">
            <video autoplay loop muted playsinline class="rounded-lg w-full">
              <source src="assets/images/Trees.mp4" type="video/mp4">
              Your browser does not support the video tag.
            </video>
            <p class="text-sm text-gray-600">Tree Loop</p>
          </div>

          <!-- Project 3 -->
          <div class="flex flex-col gap-2">
            <video autoplay loop muted playsinline class="rounded-lg w-full">
              <source src="assets/images/WaterFX2.mkv" type="video/mp4">
              Your browser does not support the video tag.
            </video>
            <p class="text-sm text-gray-600">Water FX</p>
          </div>

      </div>
    </main>
  </div>
</body>
</html>
